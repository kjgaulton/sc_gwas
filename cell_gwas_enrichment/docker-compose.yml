services:
  cell-gwas-enrichment:
    build: .
    image: cell-gwas-enrichment:latest
    volumes:
      - ./data:/pipeline/data
      - ./results:/pipeline/results
    working_dir: /pipeline
    # Default: show CLI help. Override at the CLI, e.g.:
    #   docker compose run --rm cell-gwas-enrichment Rscript run_pipeline_cli.R \
    #     --atac-rds data/my_atac_object.rds --sumstats data/my_trait_sumstats.tsv.gz \
    #     --maf-col EAF --use-maf-covariate --n-cores 4 --output results/enrichment.tsv
    #   docker compose run --rm cell-gwas-enrichment R   # interactive session
    command: ["Rscript", "run_pipeline_cli.R", "--help"]
